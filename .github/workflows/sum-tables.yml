name: QA Table Sum

on:
  workflow_dispatch:

jobs:
  sum-tables:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Run Playwright Table Sum - 22f3001317@ds.study.iitm.ac.in
        run: node sum_tables.js
